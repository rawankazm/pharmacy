<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زیادکردنی بەرهەمەکان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Naskh Arabic', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: rgba(255,255,255,0.65); margin-bottom: 30px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 24px 0;
        }
        .product-card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .product-card img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .product-emoji { font-size: 2rem; }
        .badge {
            background: rgba(167,139,250,0.2);
            border: 1px solid #a78bfa;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.65rem;
            color: #a78bfa;
        }
        .btn {
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            border: none;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
            padding: 14px 40px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(167,139,250,0.4); }
        .btn:active { transform: translateY(0); }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
        }
        .status.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #4ade80; }
        .status.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #f87171; }
    </style>
</head>
<body>
<div class="card">

    <p>١٥ بەرهەم دەزیادکرێت بۆ کۆگا، هەر یەکەیان ١٠٠ دانە</p>

            <span>برنج</span>
            <span class="badge">١٠٠ دانە</span>
        </div>
        <div class="product-card">
            <img src="/bread_loaf.png" onerror="this.style.display='none';this.nextSibling.style.display='block'" alt="Bread">
            <span class="product-emoji" style="display:none">🍞</span>
            <span>نان</span>
            <span class="badge">١٠٠ دانە</span>
        </div>
    </div>

    <div class="status" id="statusBox"></div>
</div>

</script>
</body>
</html>
